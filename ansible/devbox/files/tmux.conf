set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g default-shell /opt/homebrew/bin/fish
set -g mouse on
set -g extended-keys on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Hyper navigation
# bind -nr F13 select-pane -L
# bind -nr F14 select-pane -D
# bind -nr F15 select-pane -U
# bind -nr F16 select-pane -R
# bind -nr F17 previous-window
# bind -nr F18 next-window
#
# Vim style pane selection
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Shift-arrow keys without prefix key to switch panes
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

bind -n C-Left previous-window
bind -n C-Right next-window

# Shift Alt vim keys to switch windows

set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'soyuka/tmux-current-pane-hostname'

run '~/.config/tmux/plugins/tpm/tpm'

# Override catppuccin window formats (must come after tpm run):
# - Show #W (window name) in both active and inactive states for consistency
# - Make the active window fully orange + bold with a leading marker so it pops
set -g window-status-separator ""
setw -g window-status-format "#[fg=#1e1e2e,bg=#89b4fa] #I #[fg=#cdd6f4,bg=#45475a] #W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#fab387,bold] #I #[fg=#1e1e2e,bg=#fab387,bold]● #W "

# Show a fixed devbox marker in the lower right
set -g status on
set -g status-right-length 20
set -g status-right "#[fg=#1e1e2e,bg=#a6e3a1,bold] DEVBOX "

# set vi-mode
# set-window-option -g mode-keys vi
# keybindings
# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

unbind C-l
