---
- name: Install agent-browser apt dependencies
  ansible.builtin.apt:
    name:
      - libxcb-shm0
      - libx11-xcb1
      - libx11-6
      - libxcb1
      - libxext6
      - libxrandr2
      - libxcomposite1
      - libxcursor1
      - libxdamage1
      - libxfixes3
      - libxi6
      - libgtk-3-0t64
      - libpangocairo-1.0-0
      - libpango-1.0-0
      - libatk1.0-0t64
      - libcairo-gobject2
      - libcairo2
      - libgdk-pixbuf-2.0-0
      - libxrender1
      - libasound2t64
      - libfreetype6
      - libfontconfig1
      - libdbus-1-3
      - libnss3
      - libnspr4
      - libatk-bridge2.0-0t64
      - libdrm2
      - libxkbcommon0
      - libatspi2.0-0t64
      - libcups2t64
      - libxshmfence1
      - libgbm1
      - fonts-noto-color-emoji
      - fonts-noto-cjk
      - fonts-freefont-ttf
    state: present
    update_cache: true

- name: Check installed agent-browser version
  ansible.builtin.command:
    cmd: /usr/bin/agent-browser --version
  register: _ab_installed_version
  changed_when: false
  failed_when: false

- name: Install pinned agent-browser via npm
  ansible.builtin.command:
    cmd: npm install --global agent-browser@{{ agent_browser_version }}
  when: >
    _ab_installed_version.rc != 0
    or (_ab_installed_version.stdout | trim)
       != "agent-browser " ~ agent_browser_version
  changed_when: true

- name: Create .agent-browser directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.agent-browser"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Check if Chrome is installed for agent-browser
  ansible.builtin.command:
    argv:
      - find
      - "{{ devbox_home }}/.agent-browser/browsers"
      - -type
      - f
      - -path
      - "*/chrome-*/chrome"
      - -perm
      - -u+x
      - -print
      - -quit
  register: _ab_chrome_found
  changed_when: false
  failed_when: false

- name: Install Chrome for agent-browser
  ansible.builtin.command:
    cmd: /usr/bin/agent-browser install
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
  when: (_ab_chrome_found.stdout | trim) == ""
  changed_when: true

- name: Check if encryption key exists
  ansible.builtin.stat:
    path: "{{ devbox_home }}/.agent-browser/.encryption-key"
  register: _ab_key_stat

- name: Generate encryption key for agent-browser
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    python3 -c 'import secrets; print(secrets.token_hex(32))' > "{{ devbox_home }}/.agent-browser/.encryption-key"
    chmod 0600 "{{ devbox_home }}/.agent-browser/.encryption-key"
    chown {{ devbox_user }}:{{ devbox_user }} "{{ devbox_home }}/.agent-browser/.encryption-key"
  args:
    executable: /bin/bash
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
  when: not _ab_key_stat.stat.exists
  changed_when: true
  no_log: true

- name: Ensure encryption key mode and ownership
  ansible.builtin.file:
    path: "{{ devbox_home }}/.agent-browser/.encryption-key"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"
  no_log: true

- name: Install agent-browser config.json
  ansible.builtin.copy:
    src: config.json
    dest: "{{ devbox_home }}/.agent-browser/config.json"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0644"

- name: Install AppArmor profile for agent-browser Chrome
  ansible.builtin.template:
    src: apparmor-chrome.j2
    dest: /etc/apparmor.d/agent-browser-chrome
    owner: root
    group: root
    mode: "0644"
  notify: Reload agent-browser Chrome AppArmor profile

- name: Install /usr/local/bin/agent-browser wrapper
  ansible.builtin.copy:
    src: agent-browser-wrapper
    dest: /usr/local/bin/agent-browser
    owner: root
    group: root
    mode: "0755"

- name: Discover npm global root
  ansible.builtin.command:
    cmd: npm root --global
  register: _ab_npm_root
  changed_when: false

- name: Create Claude skills directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.claude/skills"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Create Codex skills directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.codex/skills"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Link agent-browser skill for Claude
  ansible.builtin.file:
    src: "{{ _ab_npm_root.stdout }}/agent-browser/skills/agent-browser"
    dest: "{{ devbox_home }}/.claude/skills/agent-browser"
    state: link
    force: true
    follow: false
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"

- name: Link agent-browser skill for Codex
  ansible.builtin.file:
    src: "{{ _ab_npm_root.stdout }}/agent-browser/skills/agent-browser"
    dest: "{{ devbox_home }}/.codex/skills/agent-browser"
    state: link
    force: true
    follow: false
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"

- name: Check current Claude MCP agent-browser registration
  ansible.builtin.shell: |
    set -euo pipefail
    if [[ ! -f {{ devbox_home | quote }}/.claude.json ]]; then
      echo "absent"
      exit 0
    fi
    current="$(jq -r '.mcpServers["agent-browser"] // "absent"' {{ devbox_home | quote }}/.claude.json 2>/dev/null || echo "absent")"
    if [[ "$current" == "absent" || "$current" == "null" ]]; then
      echo "absent"
      exit 0
    fi
    transport_val="$(echo "$current" | jq -r '.type // ""')"
    cmd_val="$(echo "$current" | jq -r '.command // ""')"
    args_val="$(echo "$current" | jq -c '.args // []')"
    expected_args='["mcp","--tools","core"]'
    if [[ "$transport_val" == "stdio" && "$cmd_val" == "/usr/local/bin/agent-browser" && "$args_val" == "$expected_args" ]]; then
      echo "match"
    else
      echo "mismatch"
    fi
  args:
    executable: /bin/bash
  register: _ab_claude_mcp_status
  changed_when: false
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Remove stale Claude MCP agent-browser registration
  ansible.builtin.command:
    cmd: claude mcp remove --scope user agent-browser
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
  when: _ab_claude_mcp_status.stdout == "mismatch"
  changed_when: true

- name: Register Claude MCP agent-browser server
  ansible.builtin.command:
    cmd: claude mcp add --scope user --transport stdio agent-browser -- /usr/local/bin/agent-browser mcp --tools core
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
  when: _ab_claude_mcp_status.stdout != "match"
  changed_when: true

- name: Create Codex config directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.codex"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Check current Codex MCP agent-browser registration
  ansible.builtin.shell: |
    set -euo pipefail
    expected_command="/usr/local/bin/agent-browser"
    expected_args='["mcp","--tools","core"]'

    existing="$(codex mcp get agent-browser --json 2>/dev/null || echo '{}')"
    if [[ -z "$existing" || "$existing" == "{}" || "$existing" == "null" ]]; then
      echo "absent"
      exit 0
    fi

    if jq -e \
      --arg command "$expected_command" \
      --argjson args "$expected_args" \
      '.enabled == true
       and .transport.type == "stdio"
       and .transport.command == $command
       and .transport.args == $args
       and .transport.env == null
       and .transport.env_vars == []
       and .transport.cwd == null' \
      <<<"$existing" >/dev/null; then
      echo "match"
    else
      echo "mismatch"
    fi
  args:
    executable: /bin/bash
  register: _ab_codex_mcp_status
  changed_when: false
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
    PATH: "{{ homebrew_path_entries | join(':') }}"

- name: Remove stale Codex MCP agent-browser registration
  ansible.builtin.command:
    cmd: codex mcp remove agent-browser
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
    PATH: "{{ homebrew_path_entries | join(':') }}"
  when: _ab_codex_mcp_status.stdout == "mismatch"
  changed_when: true

- name: Register Codex MCP agent-browser server
  ansible.builtin.command:
    cmd: codex mcp add agent-browser -- /usr/local/bin/agent-browser mcp --tools core
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"
    PATH: "{{ homebrew_path_entries | join(':') }}"
  when: _ab_codex_mcp_status.stdout != "match"
  changed_when: true
