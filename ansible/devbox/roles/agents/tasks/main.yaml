---
- name: Add NodeSource Node.js LTS repository
  ansible.builtin.shell: "curl -fsSL https://deb.nodesource.com/setup_{{ node_major }}.x | bash -"
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js LTS
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install Go archive
  ansible.builtin.unarchive:
    src: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: true
    creates: /usr/local/go/bin/go

- name: Link go binary
  ansible.builtin.file:
    src: /usr/local/go/bin/go
    dest: /usr/local/bin/go
    state: link
    force: true

- name: Link gofmt binary
  ansible.builtin.file:
    src: /usr/local/go/bin/gofmt
    dest: /usr/local/bin/gofmt
    state: link
    force: true

- name: Install rustup for devbox user
  ansible.builtin.shell: "curl --proto '=https' --tlsv1.2 -sSf {{ rustup_init_url }} | sh -s -- -y"
  args:
    creates: "{{ devbox_home }}/.cargo/bin/rustc"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Install uv for devbox user
  ansible.builtin.shell: "curl -LsSf {{ uv_install_url }} | sh"
  args:
    creates: "{{ devbox_home }}/.local/bin/uv"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Install commitizen with pipx
  ansible.builtin.command:
    cmd: pipx install commitizen
    creates: "{{ devbox_home }}/.local/bin/cz"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Install mitmproxy with pipx
  ansible.builtin.command:
    cmd: pipx install mitmproxy
    creates: "{{ devbox_home }}/.local/bin/mitmdump"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Enable systemd lingering for devbox user
  ansible.builtin.command:
    cmd: loginctl enable-linger {{ devbox_user }}
    creates: /var/lib/systemd/linger/{{ devbox_user }}

- name: Install AppArmor profile for Codex CLI bwrap userns fix
  ansible.builtin.copy:
    src: bwrap
    dest: /etc/apparmor.d/bwrap
    owner: root
    group: root
    mode: "0644"
  notify: Reload bwrap AppArmor profile

- name: Install Codex CLI
  ansible.builtin.shell: "curl -fsSL {{ codex_install_url }} | CODEX_NON_INTERACTIVE=1 sh"
  args:
    creates: "{{ devbox_home }}/.local/bin/codex"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Install Claude Code
  ansible.builtin.shell: "curl -fsSL {{ claude_install_url }} | bash"
  args:
    creates: "{{ devbox_home }}/.local/bin/claude"
  become_user: "{{ devbox_user }}"
  environment:
    HOME: "{{ devbox_home }}"

- name: Install home AGENTS.md pointer for Codex
  ansible.builtin.copy:
    dest: "{{ devbox_home }}/AGENTS.md"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0644"
    content: |
      @CLAUDE.md

- name: Install home CLAUDE.md server context
  ansible.builtin.copy:
    dest: "{{ devbox_home }}/CLAUDE.md"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0644"
    content: |
      # Devbox Agent Context

      This is a personal persistent Ubuntu LTS devbox running as a headless
      server in the homelab. It is reached over SSH and is not a Mac workstation
      or desktop environment.

      Use terminal-first workflows. Prefer tmux for long-running work. The home
      directory is `/home/stian`, and repositories usually live under
      `/home/stian/src`.

      The devbox runs in KubeVirt on the lab Kubernetes cluster with persistent
      Longhorn storage and local-network SSH access. Server operations from this
      home directory can include shell, systemd, Docker, kubectl, Flux, Talos,
      and GitHub CLI work when requested.

      Do not assume a GUI, clipboard, browser, or macOS tools are available. Do
      not store secrets in Git.

      ## Devbox HTML Artifacts

      Use the `devbox-html` skill and helper when a user asks for an HTML page,
      visual report, static artifact, browser-viewable note, or small local web
      app. Write public files under `/home/stian/public_html`, then share the
      matching `http://devbox/<path>` URL. Never put secrets, tokens, private
      logs, auth files, kubeconfigs, SSH keys, or sensitive transcripts in that
      public directory.

- name: Link Codex CLI into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/codex"
    dest: /usr/local/bin/codex
    state: link
    force: true

- name: Link Claude Code into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/claude"
    dest: /usr/local/bin/claude
    state: link
    force: true

- name: Link uv into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/uv"
    dest: /usr/local/bin/uv
    state: link
    force: true

- name: Link uvx into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/uvx"
    dest: /usr/local/bin/uvx
    state: link
    force: true

- name: Link commitizen into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/cz"
    dest: /usr/local/bin/cz
    state: link
    force: true

- name: Link mitmdump into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.local/bin/mitmdump"
    dest: /usr/local/bin/mitmdump
    state: link
    force: true

- name: Link rustc into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.cargo/bin/rustc"
    dest: /usr/local/bin/rustc
    state: link
    force: true

- name: Link cargo into system path
  ansible.builtin.file:
    src: "{{ devbox_home }}/.cargo/bin/cargo"
    dest: /usr/local/bin/cargo
    state: link
    force: true

- name: Create public HTML directory
  ansible.builtin.file:
    path: "{{ devbox_html_root }}"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Install devbox HTML server
  ansible.builtin.copy:
    src: devbox-html-server
    dest: /usr/local/bin/devbox-html-server
    owner: root
    group: root
    mode: "0755"
  notify: Restart devbox HTML service

- name: Install devbox HTML helper
  ansible.builtin.copy:
    src: devbox-html
    dest: /usr/local/bin/devbox-html
    owner: root
    group: root
    mode: "0755"

- name: Install Claude devbox HTML skill
  ansible.builtin.copy:
    src: agent-skills/devbox-html/
    dest: "{{ devbox_home }}/.claude/skills/devbox-html/"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: preserve

- name: Install Codex devbox HTML skill
  ansible.builtin.copy:
    src: agent-skills/devbox-html/
    dest: "{{ devbox_home }}/.codex/skills/devbox-html/"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: preserve

- name: Stop legacy Claude usage web service
  ansible.builtin.systemd:
    name: devbox-usage-web.service
    enabled: false
    state: stopped
  failed_when: false

- name: Remove legacy Claude usage web service unit
  ansible.builtin.file:
    path: /etc/systemd/system/devbox-usage-web.service
    state: absent
  notify: Reload systemd daemon

- name: Remove legacy Claude usage web helper
  ansible.builtin.file:
    path: /usr/local/bin/devbox-usage-web
    state: absent

- name: Install devbox HTML service
  ansible.builtin.copy:
    dest: /etc/systemd/system/devbox-html-server.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Devbox HTML artifact server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ devbox_user }}
      Group={{ devbox_user }}
      WorkingDirectory={{ devbox_home }}
      Environment=HOME={{ devbox_home }}
      Environment=CLAUDE_USAGE_NO_OPEN=1
      Environment=DEVBOX_HTML_ROOT={{ devbox_html_root }}
      Environment=DEVBOX_HTML_BASE_URL={{ devbox_html_base_url }}
      Environment=DEVBOX_USAGE_HTML={{ devbox_home }}/.claude/usage/usage.html
      ExecStart=/usr/local/bin/devbox-html-server --host {{ devbox_html_bind }} --port {{ devbox_html_port }} --public-root {{ devbox_html_root }}
      Restart=on-failure
      RestartSec=5
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
      NoNewPrivileges=true
      PrivateTmp=true

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd daemon
    - Restart devbox HTML service

- name: Enable devbox HTML service
  ansible.builtin.systemd:
    name: devbox-html-server.service
    enabled: true
    state: started
    daemon_reload: true
