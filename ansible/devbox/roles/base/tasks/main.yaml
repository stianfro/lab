---
- name: Install base apt packages
  ansible.builtin.apt:
    name:
      - acl
      - bat
      - build-essential
      - ca-certificates
      - curl
      - direnv
      - fd-find
      - fio
      - fish
      - fzf
      - git
      - gh
      - gnupg
      - hyperfine
      - jq
      - just
      - kubectx
      - lsof
      - lsd
      - netcat-openbsd
      - neovim
      - openssh-client
      - pipx
      - prometheus-node-exporter
      - python3
      - python3-apt
      - python3-pip
      - ripgrep
      - rsync
      - sudo
      - tmux
      - tree
      - unattended-upgrades
      - unzip
      - update-notifier-common
      - wget
      - zoxide
    state: present
    update_cache: true

- name: Configure apt periodic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Enable "1";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}:${distro_codename}-updates";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };

      Unattended-Upgrade::Package-Blacklist {
      };

      Unattended-Upgrade::DevRelease "false";
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::InstallOnShutdown "false";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "false";

- name: Create apt timer override directories
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item.name }}.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - name: apt-daily.timer
    - name: apt-daily-upgrade.timer

- name: Configure apt timer schedules
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}.d/override.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Timer]
      OnCalendar=
      OnCalendar={{ item.on_calendar }}
      RandomizedDelaySec={{ apt_daily_randomized_delay_sec }}
      Persistent=true
  loop:
    - name: apt-daily.timer
      on_calendar: "{{ apt_daily_on_calendar }}"
    - name: apt-daily-upgrade.timer
      on_calendar: "{{ apt_daily_upgrade_on_calendar }}"

- name: Reload systemd units
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable apt update timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

- name: Create user code directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/src"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Create local bin directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.local/bin"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Link fd to Ubuntu fdfind binary
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
    force: true

- name: Link bat to Ubuntu batcat binary
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
    force: true

- name: Enable Prometheus Node Exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started

- name: Install mikefarah yq
  ansible.builtin.get_url:
    url: "https://github.com/mikefarah/yq/releases/download/{{ yq_version }}/yq_linux_amd64"
    dest: /usr/local/bin/yq
    mode: "0755"
