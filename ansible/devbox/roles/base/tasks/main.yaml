---
- name: Install base apt packages
  ansible.builtin.apt:
    name:
      - acl
      - build-essential
      - ca-certificates
      - curl
      - direnv
      - fd-find
      - fish
      - fzf
      - git
      - gh
      - gnupg
      - jq
      - just
      - neovim
      - openssh-client
      - pipx
      - python3
      - python3-apt
      - python3-pip
      - ripgrep
      - sudo
      - tmux
      - unattended-upgrades
      - unzip
      - update-notifier-common
      - wget
    state: present
    update_cache: true

- name: Configure apt periodic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Enable "1";
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}:${distro_codename}-updates";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };

      Unattended-Upgrade::Package-Blacklist {
      };

      Unattended-Upgrade::DevRelease "false";
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::InstallOnShutdown "false";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "{{ unattended_upgrades_reboot_time }}";

- name: Enable apt update timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

- name: Create user code directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/src"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Create local bin directory
  ansible.builtin.file:
    path: "{{ devbox_home }}/.local/bin"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"

- name: Link fd to Ubuntu fdfind binary
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
    force: true

- name: Install mikefarah yq
  ansible.builtin.get_url:
    url: "https://github.com/mikefarah/yq/releases/download/{{ yq_version }}/yq_linux_amd64"
    dest: /usr/local/bin/yq
    mode: "0755"
