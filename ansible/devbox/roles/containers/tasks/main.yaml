---
- name: Install container packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present
    update_cache: true

- name: Enable Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add devbox user to docker group
  ansible.builtin.user:
    name: "{{ devbox_user }}"
    groups: docker
    append: true
