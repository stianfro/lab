apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: devbox
  namespace: devbox
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: devbox
    spec:
      domain:
        cpu:
          cores: 8
        resources:
          requests:
            memory: 32Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
              bootOrder: 1
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: podnet
              masquerade: {}
              ports:
                - name: ssh
                  port: 22
                  protocol: TCP
                - name: node-exporter
                  port: 9100
                  protocol: TCP
      networks:
        - name: podnet
          pod: {}
      volumes:
        - name: rootdisk
          persistentVolumeClaim:
            claimName: devbox-root
        - name: cloudinitdisk
          cloudInitNoCloud:
            networkData: |-
              version: 2
              ethernets:
                podnet:
                  match:
                    name: en*
                  dhcp4: true
                  dhcp6: false
            userData: |-
              #cloud-config
              package_update: true
              package_upgrade: false
              bootcmd:
                - |
                  printf '%s\n' \
                    'network:' \
                    '  version: 2' \
                    '  ethernets:' \
                    '    podnet:' \
                    '      match:' \
                    '        name: "en*"' \
                    '      dhcp4: true' \
                    '      dhcp6: false' \
                    >/etc/netplan/50-devbox-podnet.yaml
                  chmod 600 /etc/netplan/50-devbox-podnet.yaml
                  netplan generate
                  netplan apply
              users:
                - default
                - name: stian
                  gecos: Stian Froystein
                  groups: sudo
                  sudo: ['ALL=(ALL) NOPASSWD:ALL']
                  shell: /bin/bash
                  lock_passwd: true
                  ssh_authorized_keys:
                    - ssh-rsa 
              packages:
                - ca-certificates
                - curl
                - gnupg
                - openssh-server
                - python3
                - sudo
              ssh_pwauth: false
              disable_root: true
              write_files:
                - path: /etc/ssh/sshd_config.d/99-devbox-hardening.conf
                  permissions: '0644'
                  owner: root:root
                  content: |
                    PasswordAuthentication no
                    PermitRootLogin no
                    PubkeyAuthentication yes
              runcmd:
                - systemctl enable --now ssh
                - systemctl restart ssh
  dataVolumeTemplates:
    - metadata:
        name: devbox-root
      spec:
        storage:
          resources:
            requests:
              storage: 140Gi
          storageClassName: longhorn-devbox
        source:
          http:
            url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
