apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex-chart
  namespace: argocd
spec:
  project: default
  source:
    chart: dex
    repoURL: https://charts.dexidp.io
    targetRevision: 0.24.0
    helm:
      releaseName: dex
      values: |
        replicaCount: 1

        # Config is managed via VaultStaticSecret (dex-config secret)
        # to avoid env-var substitution issues in Dex v2.44+
        configSecret:
          create: false
          name: dex-config

        service:
          type: ClusterIP
          ports:
            http:
              port: 5556
              targetPort: 5556
              nodePort: null

        ingress:
          enabled: false

        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

  destination:
    namespace: dex
    server: https://kubernetes.default.svc

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
