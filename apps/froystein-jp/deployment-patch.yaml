apiVersion: apps/v1
kind: Deployment
metadata:
  name: froystein-jp
  namespace: froystein-jp
spec:
  template:
    spec:
      containers:
        - name: web
          image: ghcr.io/stianfro/froystein.jp:pr-37-7784c8d@sha256:15f23b072b23602a07a9e8e0b729651773651d495d98d3cd96c55e090a52d177
          volumeMounts:
            - name: analytics-config
              mountPath: /usr/share/nginx/html/analytics-config.js
              subPath: analytics-config.js
              readOnly: true
      volumes:
        - name: analytics-config
          configMap:
            name: froystein-jp-analytics-config
