apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 10m
  releaseName: envoy-gateway
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: gateway-helm
      version: v1.5.4
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
  values:
    config:
      envoyGateway:
        gateway:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller
        extensionApis:
          enableBackend: true
  driftDetection:
    mode: enabled
