apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  releaseName: headlamp
  targetNamespace: headlamp
  install:
    createNamespace: true
  chart:
    spec:
      chart: headlamp
      version: 0.41.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    replicaCount: 1
    clusterRoleBinding:
      create: true
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    config:
      oidc:
        externalSecret:
          enabled: true
          name: headlamp-oidc
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  driftDetection:
    mode: enabled
