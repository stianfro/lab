apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  releaseName: headlamp
  targetNamespace: headlamp
  install:
    createNamespace: true
  chart:
    spec:
      chart: headlamp
      version: 0.41.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    replicaCount: 1
    clusterRoleBinding:
      create: true
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    config:
      pluginsDir: /headlamp/plugins
      oidc:
        externalSecret:
          enabled: true
          name: headlamp-oidc
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0@sha256:055377b9011dcc73235e8969c488ecd92af5cb70aa5d5df0f66c1cea667fdccb
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /headlamp/plugins
            cp -r /plugins/* /headlamp/plugins/
            chown -R 100:101 /headlamp/plugins
        securityContext:
          runAsNonRoot: false
          privileged: false
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /headlamp/plugins
      - name: headlamp-plugin-kubevirt
        image: registry.talos.froystein.jp/headlamp-plugin-kubevirt:4e917cc2ff62@sha256:28485f29d298c4e697cd6977a9cc712ad489c750793839e68dcf9af146195161
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /headlamp/plugins
            cp -r /plugins/* /headlamp/plugins/
            chown -R 100:101 /headlamp/plugins
        securityContext:
          runAsNonRoot: false
          privileged: false
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /headlamp/plugins
    volumeMounts:
      - name: headlamp-plugins
        mountPath: /headlamp/plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  driftDetection:
    mode: enabled
