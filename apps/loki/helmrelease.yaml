apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 10m
  releaseName: loki
  targetNamespace: loki
  install:
    createNamespace: true
  chart:
    spec:
      chart: loki
      version: 6.46.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 336h
        max_query_series: 100000
        max_query_lookback: 336h
      rulerConfig:
        storage:
          type: local
          local:
            directory: /var/loki/rules
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
        working_directory: /var/loki/compactor
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 50Gi
        accessModes:
          - ReadWriteOnce
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 1Gi
      extraEnv:
        - name: GOMEMLIMIT
          value: "1800MiB"
    gateway:
      enabled: true
      replicas: 1
      service:
        type: ClusterIP
      nginxConfig:
        customWriteUrl: |
          location = /otlp/v1/logs {
            proxy_pass http://{{ include "loki.singleBinaryFullname" . }}:3100$request_uri;
          }
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
    test:
      enabled: false
  driftDetection:
    mode: enabled
