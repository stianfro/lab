apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  releaseName: longhorn-chart
  targetNamespace: longhorn-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: longhorn
      version: v1.10.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    preUpgradeChecker:
      jobEnabled: false
    defaultSettings:
      backupTarget: nfs://192.168.1.10:/mnt/user/backup/longhorn
      backupTargetCredentialSecret: ""
  driftDetection:
    mode: enabled
