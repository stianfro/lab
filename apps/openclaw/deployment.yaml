apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-state
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - >
              mkdir -p /data/.openclaw /data/workspace &&
              if [ ! -f /data/.openclaw/openclaw.json ]; then
                cp /bootstrap/openclaw.json /data/.openclaw/openclaw.json;
              fi &&
              chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
            - name: bootstrap-config
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.11
          imagePullPolicy: IfNotPresent
          command:
            - node
            - dist/index.js
            - gateway
            - --bind
            - lan
            - --port
            - "18789"
            - --allow-unconfigured
          envFrom:
            - configMapRef:
                name: openclaw-env
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DISCORD_BOT_TOKEN
            - name: SETUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: SETUP_PASSWORD
            - name: GOG_KEYRING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GOG_KEYRING_PASSWORD
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: bootstrap-config
          configMap:
            name: openclaw-bootstrap
            items:
              - key: openclaw.json
                path: openclaw.json
