apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry
  namespace: flux-system
spec:
  interval: 10m
  releaseName: registry
  targetNamespace: registry
  install:
    createNamespace: true
  chart:
    spec:
      chart: zot
      version: 0.1.116
      sourceRef:
        kind: HelmRepository
        name: zot
        namespace: flux-system
  values:
    fullnameOverride: registry
    replicaCount: 1
    image:
      repository: ghcr.io/project-zot/zot
      tag: v2.1.17
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 5000
    serviceHeadless:
      enabled: true
      port: 5000
    httproute:
      enabled: true
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
      hostnames:
        - registry.talos.froystein.jp
      pathType: PathPrefix
      path: /
    mountConfig: true
    configFiles:
      config.json: |-
        {
          "storage": { "rootDirectory": "/var/lib/registry" },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "readTimeout": "60s",
            "writeTimeout": "60s",
            "compat": ["docker2s2"]
          },
          "log": { "level": "info" }
        }
    persistence: true
    pvc:
      create: true
      accessModes:
        - ReadWriteOnce
      storage: 100Gi
      storageClassName: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
    startupProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 12
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    metrics:
      enabled: false
    test:
      enabled: false
  driftDetection:
    mode: enabled
