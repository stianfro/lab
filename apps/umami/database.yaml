apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-pg
  namespace: umami
spec:
  instances: 1
  bootstrap:
    initdb:
      database: umami
      owner: umami
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  storage:
    storageClass: longhorn
    size: 5Gi
