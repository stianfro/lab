apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: umami
  namespace: umami
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network-monitor
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        - podSelector: {}
