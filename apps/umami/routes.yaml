apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami-dashboard
  namespace: umami
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - analytics.talos.froystein.jp
  rules:
    - backendRefs:
        - name: umami
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami-collector
  namespace: umami
spec:
  parentRefs:
    - name: eg-public
      namespace: envoy-gateway-system
  hostnames:
    - www.froystein.jp
  rules:
    - matches:
        - path:
            type: Exact
            value: /_analytics/script.js
      backendRefs:
        - name: umami
          port: 3000
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /script.js
    - matches:
        - path:
            type: Exact
            value: /_analytics/api/send
      backendRefs:
        - name: umami
          port: 3000
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /api/send
