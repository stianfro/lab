apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  interval: 10m
  releaseName: vault-secrets-operator
  targetNamespace: vault
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: vault-secrets-operator
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    defaultVaultConnection:
      enabled: true
      address: http://vault-active.vault.svc:8200
      skipTLSVerify: false
    controller:
      manager:
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
  driftDetection:
    mode: enabled
