apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: lab
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/stianfro/lab.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/talos
  prune: true
  sourceRef:
    kind: GitRepository
    name: lab
  timeout: 10m
  wait: true
